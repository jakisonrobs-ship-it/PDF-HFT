<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
<title>Visualizador</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #06060F;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    font-family: Helvetica, Arial, sans-serif;
    -webkit-overflow-scrolling: touch;
  }

  #loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 16px;
  }

  .spinner {
    width: 44px;
    height: 44px;
    border: 3px solid #1A1A35;
    border-top-color: #00FF88;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #loader p {
    color: #8888AA;
    font-size: 13px;
    letter-spacing: 1px;
  }

  #canvas-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    padding: 6px 0 20px;
    gap: 4px;
  }

  canvas {
    display: block;
    width: 100%;
    max-width: 900px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.7);
  }

  #error {
    display: none;
    color: #FF3366;
    text-align: center;
    padding: 40px 20px;
    font-size: 13px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <p>Carregando...</p>
</div>

<div id="canvas-container"></div>
<div id="error">Não foi possível carregar o arquivo.<br>Verifique sua conexão e tente novamente.</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // Pega o PDF da query string: ?file=nome.pdf
  const params  = new URLSearchParams(window.location.search);
  const fileParam = params.get('file') || '';

  // Monta a URL do PDF no mesmo repo (pasta raiz)
  const BASE = 'https://cdn.jsdelivr.net/gh/jakisonrobs-ship-it/PDF-HFT@main/';
  const PDF_URL = fileParam.startsWith('http') ? fileParam : BASE + fileParam;

  async function renderPDF(url) {
    try {
      const loadingTask = pdfjsLib.getDocument({ url, cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/', cMapPacked: true });
      const pdf = await loadingTask.promise;

      document.getElementById('loader').style.display = 'none';

      const container = document.getElementById('canvas-container');
      const viewport_width = Math.min(window.innerWidth, 900);
      const dpr = window.devicePixelRatio || 1;

      for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
        const page    = await pdf.getPage(pageNum);
        const vp0     = page.getViewport({ scale: 1 });
        const scale   = (viewport_width / vp0.width) * dpr;
        const viewport = page.getViewport({ scale });

        const canvas  = document.createElement('canvas');
        const ctx     = canvas.getContext('2d');
        canvas.width  = viewport.width;
        canvas.height = viewport.height;
        canvas.style.width  = (viewport.width  / dpr) + 'px';
        canvas.style.height = (viewport.height / dpr) + 'px';

        await page.render({ canvasContext: ctx, viewport }).promise;
        container.appendChild(canvas);
      }
    } catch (err) {
      document.getElementById('loader').style.display  = 'none';
      document.getElementById('error').style.display   = 'block';
      console.error(err);
    }
  }

  renderPDF(PDF_URL);
</script>
</body>
</html>
